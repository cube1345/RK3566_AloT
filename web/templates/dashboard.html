<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent ZX 智能家居总控</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1a1a24;
  --border: #252530;
  --text: #e4e4ec;
  --text2: #9494a4;
  --text3: #646476;
  --accent: #6c8cff;
  --accent2: #a78bfa;
  --green: #34d399;
  --orange: #fb923c;
  --red: #f87171;
  --cyan: #22d3ee;
  --phase-observe: #3b82f6;
  --phase-analyze: #a78bfa;
  --phase-decide: #34d399;
  --phase-question: #fb923c;
  --radius: 10px;
  --font: -apple-system, 'Segoe UI', 'Noto Sans SC', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* Layout */
.app { display: flex; height: 100vh; }
.sidebar { width: 320px; min-width: 320px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* Header */
.header { padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 16px; font-weight: 600; }
.badge { background: var(--green); color: #000; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }

/* Sidebar sensor cards */
.sidebar-section { padding: 12px 16px; }
.sidebar-section h3 { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.sensor-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: var(--surface2); border-radius: 6px; margin-bottom: 6px; }
.sensor-row .name { font-size: 12px; color: var(--text2); }
.sensor-row .val { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
.sensor-row .unit { font-size: 10px; color: var(--text3); margin-left: 2px; }

.device-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--surface2); border-radius: 6px; margin-bottom: 4px; font-size: 12px; }
.device-row .icon { width: 20px; text-align: center; }
.device-row .state { margin-left: auto; color: var(--text3); font-size: 11px; }

.status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.status-dot.ok { background: var(--green); }
.status-dot.warn { background: var(--orange); }
.status-dot.bad { background: var(--red); }

/* Main chat area */
.chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 14px; flex-direction: column; gap: 8px; }

/* Message bubbles */
.msg { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.2s ease; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.agent { align-self: flex-start; }
.msg .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.msg.user .avatar { background: var(--accent); }
.msg.agent .avatar { background: var(--accent2); }
.msg .bubble { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; line-height: 1.55; }
.msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.agent .bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

/* CoT thinking chain */
.cot-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin: 8px 0; overflow: hidden; }
.cot-header { padding: 8px 12px; font-size: 11px; color: var(--text3); cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; }
.cot-header:hover { color: var(--text2); }
.cot-header .arrow { transition: transform 0.2s; font-size: 10px; }
.cot-header.open .arrow { transform: rotate(90deg); }
.cot-body { display: none; padding: 0 12px 12px; }
.cot-body.show { display: block; }
.cot-phase { margin-top: 10px; padding: 8px 10px; border-radius: 6px; border-left: 3px solid; font-size: 12px; line-height: 1.5; }
.cot-phase.observe { border-color: var(--phase-observe); background: rgba(59,130,246,0.08); }
.cot-phase.analyze { border-color: var(--phase-analyze); background: rgba(167,139,250,0.08); }
.cot-phase.decide { border-color: var(--phase-decide); background: rgba(52,211,153,0.08); }
.cot-phase.question { border-color: var(--phase-question); background: rgba(251,146,60,0.08); }
.cot-phase .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.cot-phase.observe .label { color: var(--phase-observe); }
.cot-phase.analyze .label { color: var(--phase-analyze); }
.cot-phase.decide .label { color: var(--phase-decide); }
.cot-phase.question .label { color: var(--phase-question); }
.cot-phase .content { color: var(--text); font-size: 13px; white-space: pre-wrap; word-break: break-word; }

/* Typewriter cursor */
.typing-cursor::after { content: '▊'; animation: blink 1s step-end infinite; color: var(--accent); }
@keyframes blink { 50% { opacity: 0; } }

/* Phase progress indicator */
.phase-progress { display: flex; gap: 4px; align-items: center; padding: 6px 0; }
.phase-step { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text3); transition: color 0.3s; }
.phase-step .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
.phase-step.active { color: var(--text2); }
.phase-step.active .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.phase-step.done { color: var(--text2); }
.phase-step.done .dot { background: var(--green); }
.phase-step .line { width: 10px; height: 1px; background: var(--border); }

/* Tool execution result */
.tool-result { font-size: 11px; color: var(--text3); padding: 4px 8px; background: rgba(52,211,153,0.06); border-radius: 4px; margin-top: 4px; border-left: 2px solid var(--green); }
.tool-result code { font-size: 11px; color: var(--green); }

/* Input area */
.input-bar { padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 8px; }
.input-bar input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 13px; outline: none; font-family: var(--font); }
.input-bar input:focus { border-color: var(--accent); }
.input-bar button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: .2s; }
.btn-send { background: var(--accent); color: #fff; }
.btn-send:hover { opacity: 0.9; }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

/* Options row */
.options-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.option-btn { padding: 5px 12px; border-radius: 14px; font-size: 11px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; transition: .2s; }
.option-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Status section */
.status-section { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text3); }
.status-section .kv { display: flex; justify-content: space-between; padding: 2px 0; }

/* Responsive */
@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; min-width: 0; max-height: 200px; flex-shrink: 0; }
  .sidebar .sensor-row, .sidebar .device-row { display: inline-flex; margin-right: 6px; }
  .sidebar-section { padding: 8px 12px; }
  .msg { max-width: 95%; }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* Thinking spinner */
.thinking { display: flex; align-items: center; gap: 8px; padding: 12px; color: var(--text3); font-size: 12px; }
.thinking .dots { display: flex; gap: 3px; }
.thinking .dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: bounce 1.4s ease-in-out infinite both; }
.thinking .dots span:nth-child(1) { animation-delay: -0.32s; }
.thinking .dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

/* Quick commands */
.quick-cmds { padding: 0 20px 10px; display: flex; gap: 6px; flex-wrap: wrap; }
.quick-cmd { padding: 4px 10px; border-radius: 12px; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: .2s; white-space: nowrap; }
.quick-cmd:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div class="app">
  <!-- 左侧面板 -->
  <div class="sidebar">
    <div class="header">
      <h1>🏠 Agent ZX</h1>
      <span class="badge" id="statusBadge">运行中</span>
    </div>

    <div class="sidebar-section">
      <h3>📡 传感器</h3>
      <div id="sensorList">
        <div class="sensor-row"><span class="name">CO₂</span><span><span class="val" id="co2Val">--</span><span class="unit">ppm</span></span></div>
        <div class="sensor-row"><span class="name">温度</span><span><span class="val" id="tempVal">--</span><span class="unit">°C</span></span></div>
        <div class="sensor-row"><span class="name">湿度</span><span><span class="val" id="humidVal">--</span><span class="unit">%</span></span></div>
        <div class="sensor-row"><span class="name">光照</span><span><span class="val" id="lightVal">--</span><span class="unit">lux</span></span></div>
        <div class="sensor-row"><span class="name">人体</span><span><span class="val" id="motionVal">--</span></span></div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>🔧 设备</h3>
      <div id="deviceList">
        <div class="device-row"><span class="icon">💡</span>灯<span class="state" id="devLight">--</span></div>
        <div class="device-row"><span class="icon">🌀</span>风扇<span class="state" id="devFan">--</span></div>
        <div class="device-row"><span class="icon">❄️</span>空调<span class="state" id="devAc">--</span></div>
        <div class="device-row"><span class="icon">🌬️</span>净化<span class="state" id="devPurifier">--</span></div>
      </div>
    </div>

    <div class="sidebar-section" id="quickCmds" style="display:none;">
      <h3>⚡ 快捷指令</h3>
      <div class="quick-cmds">
        <span class="quick-cmd" onclick="sendText('晚安')">🌙 晚安</span>
        <span class="quick-cmd" onclick="sendText('太热了')">🔥 太热了</span>
        <span class="quick-cmd" onclick="sendText('太闷了')">💨 太闷了</span>
        <span class="quick-cmd" onclick="sendText('冰箱里有什么')">🥘 冰箱</span>
        <span class="quick-cmd" onclick="sendText('家里环境怎么样')">📊 环境</span>
        <span class="quick-cmd" onclick="sendText('今天穿什么')">👔 穿衣</span>
      </div>
    </div>

    <div class="status-section">
      <div class="kv"><span>LLM</span><span id="sysLlm">--</span></div>
      <div class="kv"><span>模式</span><span id="sysMode">--</span></div>
      <div class="kv"><span>工具</span><span id="sysTools">--</span></div>
    </div>
  </div>

  <!-- 主对话区 -->
  <div class="main">
    <div class="chat-container" id="chatContainer">
      <div class="chat-empty" id="chatEmpty">
        <div style="font-size:40px; margin-bottom:8px;">🤖</div>
        <div>Agent ZX 已就绪，输入指令开始对话</div>
        <div style="font-size:11px; color:var(--text3);">支持环境控制 / 食材管理 / 生活建议</div>
      </div>
    </div>

    <div class="input-bar">
      <input id="cmdInput" type="text" placeholder="输入指令..." onkeydown="if(event.key==='Enter')sendCommand()" autofocus>
      <button class="btn-send" onclick="sendCommand()" id="sendBtn">发送</button>
    </div>
  </div>
</div>

<script>
// ===== State =====
let isProcessing = false;

// ===== Helper =====
function $(id) { return document.getElementById(id); }
async function fetchJSON(url, opts) { const r = await fetch(url, opts); return r.json(); }

// ===== Send command =====
async function sendCommand() {
  if (isProcessing) return;
  const input = $('cmdInput');
  const text = input.value.trim();
  if (!text) return;
  sendText(text);
  input.value = '';
}

function sendText(text) {
  if (isProcessing) return;
  isProcessing = true;
  $('sendBtn').disabled = true;
  const chat = $('chatContainer');
  const empty = $('chatEmpty');
  if (empty) empty.style.display = 'none';

  // User message
  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.innerHTML = `<div class="avatar">👤</div><div class="bubble">${escapeHtml(text)}</div>`;
  chat.appendChild(userMsg);

  // AI thinking placeholder
  const thinkMsg = document.createElement('div');
  thinkMsg.className = 'msg agent';
  thinkMsg.id = 'thinkMsg-' + Date.now();
  thinkMsg.innerHTML = `<div class="avatar">🧠</div>
    <div class="bubble">
      <div class="thinking"><div class="dots"><span></span><span></span><span></span></div>思考中...</div>
    </div>`;
  chat.appendChild(thinkMsg);
  chat.scrollTop = chat.scrollHeight;

  // Fetch SSE stream
  fetch('/api/command/stream', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text}),
  }).then(async resp => {
    if (!resp.ok || resp.headers.get('content-type')?.includes('application/json')) {
      // Non-streaming fallback
      const data = await resp.json();
      renderResult(thinkMsg, data);
      return;
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let phases = {};

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.phase === 'done') {
            renderResult(thinkMsg, data);
          } else {
            phases[data.phase] = data;
            renderPhases(thinkMsg, phases);
          }
        } catch(e) {}
      }
    }
    if (buffer.startsWith('data: ')) {
      try {
        const data = JSON.parse(buffer.slice(6));
        if (data.phase === 'done') renderResult(thinkMsg, data);
      } catch(e) {}
    }
    isProcessing = false;
    $('sendBtn').disabled = false;
    loadEvents();
  }).catch(() => {
    isProcessing = false;
    $('sendBtn').disabled = false;
  });
}

// ===== Render =====
function renderPhases(container, phases) {
  const phaseOrder = ['observe', 'analyze', 'decide', 'question'];
  const labels = {observe:'观察', analyze:'分析', decide:'决策', question:'反问'};
  const classes = {observe:'observe', analyze:'analyze', decide:'decide', question:'question'};
  const icons = {observe:'👁️', analyze:'🧩', decide:'⚡', question:'❓'};

  const doneKeys = Object.keys(phases);
  let phaseHtml = '<div class="phase-progress">';
  for (const p of phaseOrder) {
    const status = doneKeys.includes(p) ? 'done' : (doneKeys.length && phaseOrder.indexOf(p) <= doneKeys.length ? 'active' : '');
    phaseHtml += `<div class="phase-step ${status}"><div class="dot"></div>${labels[p]}</div>`;
    if (p !== 'question') phaseHtml += '<div class="line"></div>';
  }
  phaseHtml += '</div>';

  let bodyHtml = '';
  for (const p of phaseOrder) {
    if (phases[p]) {
      bodyHtml += `<div class="cot-phase ${classes[p]}">
        <div class="label">${icons[p]} ${labels[p]}</div>
        <div class="content">${escapeHtml(phases[p].text)}</div>
      </div>`;
    }
  }

  container.querySelector('.bubble').innerHTML = `
    <div class="cot-block">
      <div class="cot-header open" onclick="toggleCot(this)"><span class="arrow">▶</span> AI 思考链</div>
      <div class="cot-body show">${phaseHtml}${bodyHtml}</div>
    </div>
    <div class="typing-cursor"></div>`;
}

function renderResult(container, data) {
  let html = '';

  // CoT phases
  if (data.reply) {
    // Parse reply for CoT patterns
    const cot = parseCoT(data.reply);
    if (cot) {
      html += cot;
    } else {
      html += `<div style="white-space:pre-wrap;">${escapeHtml(data.reply)}</div>`;
    }
  }

  // Actions
  if (data.actions && data.actions.length) {
    html += '<div style="margin-top:8px;">';
    for (const a of data.actions) {
      const result = a.result ? (typeof a.result === 'string' ? a.result.slice(0, 80) : JSON.stringify(a.result).slice(0, 80)) : 'ok';
      html += `<div class="tool-result">✓ <code>${a.tool}</code> → ${escapeHtml(result)}</div>`;
    }
    html += '</div>';
  }

  // Options
  if (data.options && data.options.length) {
    html += '<div class="options-row">';
    for (const opt of data.options) {
      html += `<span class="option-btn" onclick="sendText('${escapeAttr(opt)}')">${escapeHtml(opt)}</span>`;
    }
    html += '</div>';
  }

  container.querySelector('.bubble').innerHTML = html || '<div style="color:var(--text3);">收到</div>';
}

function parseCoT(text) {
  const patterns = [
    {key:'观察', cls:'observe', icon:'👁️'},
    {key:'分析', cls:'analyze', icon:'🧩'},
    {key:'决策', cls:'decide', icon:'⚡'},
    {key:'反问', cls:'question', icon:'❓'},
  ];
  let found = false;
  let html = '<div class="cot-block"><div class="cot-header open" onclick="toggleCot(this)"><span class="arrow">▶</span> AI 思考链</div><div class="cot-body show">';
  for (const p of patterns) {
    const re = new RegExp(p.key + '\\s*[:：]\\s*(.+?)(?:\\n|$)', 's');
    const m = text.match(re);
    if (m) {
      found = true;
      html += `<div class="cot-phase ${p.cls}"><div class="label">${p.icon} ${p.key}</div><div class="content">${escapeHtml(m[1].trim())}</div></div>`;
    }
  }
  html += '</div></div>';
  return found ? html : null;
}

function toggleCot(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('show');
}

// ===== Sensor & device updates =====
async function updateSensors() {
  const d = await fetchJSON('/api/sensors');
  const co2 = d.co2?.value;
  $('co2Val').textContent = co2 != null ? Math.round(co2) : '--';
  $('tempVal').textContent = d.temperature?.value != null ? d.temperature.value.toFixed(1) : '--';
  $('humidVal').textContent = d.humidity?.value != null ? d.humidity.value.toFixed(0) : '--';
  $('lightVal').textContent = d.light?.value != null ? Math.round(d.light.value) : '--';
  $('motionVal').textContent = d.motion?.value > 0.5 ? '👤 有人' : '⬜ 无人';
}

async function updateDevices() {
  const d = await fetchJSON('/api/devices');
  $('devFan').textContent = d.fan?.state || '--';
  const light = d.light;
  $('devLight').textContent = light?.state === 'on' ? `开(${light.brightness})` : (light?.state || '--');
  $('devAc').textContent = d.ac?.state || '--';
  $('devPurifier').textContent = d.purifier?.state || '--';
}

async function updateStatus() {
  const s = await fetchJSON('/api/status');
  $('sysLlm').textContent = s.llm_loaded ? '🟢 已加载' : '🔴 未加载';
  $('sysMode').textContent = s.mock_mode ? 'Mock' : 'Hardware';
  $('sysTools').textContent = s.tools + '个';
}

async function loadEvents() {
  // Just update sidebar implicitly
}

// ===== Poll =====
setInterval(updateSensors, 3000);
setInterval(updateDevices, 5000);
setInterval(updateStatus, 10000);
setInterval(pollQuestion, 5000);

// Initial
updateSensors();
updateDevices();
updateStatus();

// ===== Question polling =====
async function pollQuestion() {
  const q = await fetchJSON('/api/pending_question');
  if (!q || !q.text) return;
  const chat = $('chatContainer');
  const empty = $('chatEmpty');
  if (empty) empty.style.display = 'none';

  // Check if already showing
  const existing = chat.querySelector('[data-qid]');
  if (existing) return;

  const qType = q.type || '';
  const icon = qType === 'clarification' ? '❓' : qType === 'proactive_suggestion' ? '💡' : '🤔';
  const msg = document.createElement('div');
  msg.className = 'msg agent';
  msg.setAttribute('data-qid', Date.now());
  let optHtml = '';
  if (q.options && q.options.length) {
    optHtml = '<div class="options-row">' + q.options.map((opt, i) =>
      `<span class="option-btn ${i===0?'':'style="border-color:var(--border)"'}" onclick="answerQuestion('${escapeAttr(opt)}', this.parentElement.parentElement.parentElement)">${escapeHtml(opt)}</span>`
    ).join('') + '</div>';
  }
  msg.innerHTML = `<div class="avatar">${icon}</div>
    <div class="bubble">
      <div style="white-space:pre-wrap; margin-bottom:4px;">${escapeHtml(q.text)}</div>
      ${optHtml}
    </div>`;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

async function answerQuestion(answer, msgEl) {
  await fetch('/api/answer_question', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({answer}),
  });
  // Replace options with selected answer
  const bubble = msgEl.querySelector('.bubble');
  const optsRow = bubble.querySelector('.options-row');
  if (optsRow) optsRow.innerHTML = `<div style="font-size:11px; color:var(--text3); margin-top:4px;">→ 已选: ${escapeHtml(answer)}</div>`;
  loadEvents();
}

// ===== Utility =====
function escapeHtml(s) {
  if (!s) return '';
  s = String(s);
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(s) {
  return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
}
